name: Bug Report
description: Report a validation bug or test failure
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Schema / Instance
      description: Minimal schema and instance to reproduce the issue.
      render: json
      placeholder: |
        Schema:  {"type": "string"}
        Instance: 42
        Expected: invalid
        Actual:   valid
    validations:
      required: true
